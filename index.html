<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #020617;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      cursor: pointer;
    }

    section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .hero {
      text-align: center;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
    }
  </style>
</head>
<body>

<header>
  <h2>Mon Portfolio</h2>
  <nav>
    <a onclick="scrollToSection('home')">Accueil</a>
    <a onclick="scrollToSection('projects')">Projets</a>
    <a onclick="scrollToSection('contact')">Contact</a>
  </nav>
</header>

<section id="home" class="hero">
  <h1>Salut, moi c'est Ton Nom</h1>
  <p>Développeur Web | Créatif | Passionné</p>
</section>

<section id="projects">
  <h2>Mes Projets</h2>
  <div class="projects">
    <div class="card">Projet 1</div>
    <div class="card">Projet 2</div>
    <div class="card">Projet 3</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email : ton@email.com</p>
</section>

<footer>
  <p>© 2026 Mon Portfolio</p>
</footer>

<script>
  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
